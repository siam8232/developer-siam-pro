<script>
    function copyUID(element) {
        const uidText = document.getElementById('ff-uid').innerText;
        
        // ফলব্যাক পদ্ধতি (সব পরিবেশে কাজ করবে)
        const textArea = document.createElement("textarea");
        textArea.value = uidText;
        // এলিমেন্টটিকে স্ক্রিনের বাইরে রাখা
        textArea.style.position = "absolute";
        textArea.style.left = "-9999px";
        document.body.appendChild(textArea);
        textArea.select();
        document.execCommand("copy"); // টেক্সট কপি করা
        document.body.removeChild(textArea);

        // ব্যবহারকারীকে ফিডব্যাক দেওয়া
        const tooltip = element.nextElementSibling; // .copy-icon এর পরের এলিমেন্ট হলো tooltip
        tooltip.classList.add('show');

        // ১.৫ সেকেন্ড পর টুলটিপটি লুকিয়ে ফেলা
        setTimeout(() => {
            tooltip.classList.remove('show');
        }, 1500);
    }
</script>
